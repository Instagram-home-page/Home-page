<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
// 3× native resolution = 9× more pixels to compute
canvas.width  = window.innerWidth  * 3;
canvas.height = window.innerHeight * 3;
canvas.style.width  = '100vw';
canvas.style.height = '100vh';

const gl = canvas.getContext('webgl', {antialias:false, powerPreference:'high-performance', preserveDrawingBuffer:false})
        || canvas.getContext('experimental-webgl');
if(!gl) throw 0;

const FS_MAIN = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;

#define TAU 6.28318530718
#define STEPS 512
#define STEP  0.016
#define SHAD_STEPS 32
#define SHAD_STEP  0.055

// ── Hash ──
float h13(vec3 p){p=fract(p*vec3(443.897,441.423,437.195));p+=dot(p,p.yxz+19.19);return fract((p.x+p.y)*p.z);}
float h12(vec2 p){vec3 q=fract(vec3(p.xyx)*0.1031);q+=dot(q,q.yzx+33.33);return fract((q.x+q.y)*q.z);}
float h11(float p){return fract(sin(p)*43758.5453);}

// ── Value noise ──
float vn(vec3 p){
  vec3 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);
  return mix(mix(mix(h13(i),h13(i+vec3(1,0,0)),f.x),mix(h13(i+vec3(0,1,0)),h13(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(h13(i+vec3(0,0,1)),h13(i+vec3(1,0,1)),f.x),mix(h13(i+vec3(0,1,1)),h13(i+vec3(1,1,1)),f.x),f.y),f.z);
}

mat2 r2(float a){return mat2(cos(a),-sin(a),sin(a),cos(a));}

// ── 16-octave FBM ──
float fbm(vec3 p){
  float v=0.0,a=0.5;
  for(int i=0;i<16;i++){
    v+=a*vn(p);
    p.xy=r2(0.52)*p.xy;
    p.xz=r2(0.37)*p.xz;
    p.yz=r2(0.21)*p.yz;
    p=p*2.11+vec3(100.3+float(i)*7.3);
    a*=0.475;
  }
  return v;
}

// ── Quintuple domain warp ──
float warp5(vec3 p, float t){
  vec3 q=vec3(fbm(p+vec3(0,0,t*.11)),fbm(p+vec3(5.2,1.3,t*.09)),fbm(p+vec3(1.7,9.2,t*.07)));
  vec3 r=vec3(fbm(p+4.*q+vec3(1.7,9.2,t*.06)),fbm(p+4.*q+vec3(8.3,2.8,t*.06)),fbm(p+4.*q+vec3(3.1,6.4,t*.05)));
  vec3 s=vec3(fbm(p+4.*r+vec3(6.3,t*.04,2.1)),fbm(p+4.*r+vec3(t*.03,4.4,8.2)),fbm(p+4.*r+vec3(5.5,3.3,t*.05)));
  vec3 w=vec3(fbm(p+4.*s+vec3(2.2,7.1,t*.04)),fbm(p+4.*s+vec3(9.0,t*.03,1.5)),fbm(p+4.*s+vec3(4.4,2.6,t*.06)));
  vec3 x=vec3(fbm(p+4.*w+vec3(3.3,t*.05,5.5)),fbm(p+4.*w+vec3(t*.04,6.6,2.2)),fbm(p+4.*w+vec3(7.7,1.1,t*.03)));
  return fbm(p+4.*x);
}

// ── SDF scene ──
float sdS(vec3 p,float r){return length(p)-r;}
float sdT(vec3 p,vec2 t){return length(vec2(length(p.xz)-t.x,p.y))-t.y;}
float sdB(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sdC(vec3 p,vec3 a,vec3 b,float r){vec3 pa=p-a,ba=b-a;return length(pa-ba*clamp(dot(pa,ba)/dot(ba,ba),0.,1.))-r;}
float sdO(vec3 p,float s){p=abs(p);return(p.x+p.y+p.z-s)*.57735027;}
float sdL(vec3 p,float h,float r){vec2 d=vec2(length(p.xz)-r,abs(p.y)-h);return min(max(d.x,d.y),0.)+length(max(d,0.));}
float sm(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

float scene(vec3 p,float t){
  // 6 rotating frames
  vec3 p1=vec3(r2(t*.5)*p.xz,p.y).xzy;
  vec3 p2=vec3(p.x,r2(t*.3)*p.yz);
  vec3 p3=vec3(r2(t*.7)*p.xy,p.z).xzy;
  vec3 p4=vec3(r2(t*.2)*p.xz,p.y).xzy;
  vec3 p5=vec3(p.x,r2(t*.9)*p.yz);
  float a=sdS(p,.5+.1*sin(t*2.3));
  float b=sdT(p1,vec2(1.0+.07*sin(t*1.4),.20));
  float c=sdT(p2,vec2(.82+.06*cos(t*1.8),.16));
  float d=sdT(p3,vec2(.62+.05*sin(t*2.1),.13));
  float e=sdT(p4,vec2(.42+.04*cos(t*2.5),.10));
  float f=sdB(p-vec3(sin(t*.7)*.35,cos(t*.5)*.35,sin(t*.9)*.2),vec3(.20));
  float g=sdC(p,vec3(sin(t)*.7,-0.7,cos(t*.6)*.3),vec3(cos(t)*.7,.7,sin(t*.4)*.3),.09);
  float h2=sdO(p-vec3(cos(t*.4)*.5,sin(t*.6)*.4,cos(t*.8)*.3),.32);
  float i2=sdL(p5-vec3(sin(t*.3)*.4,0.,cos(t*.5)*.4),.5,.15);
  // Fractal repetition at 3 scales
  vec3 fp =fract(p*.40)*2.50-1.25; float j=sdS(fp,.28)*2.50;
  vec3 fp2=fract(p*.72+.36)*1.39-.695; float k2=sdB(fp2,vec3(.17))*1.39;
  vec3 fp3=fract(p*1.30+.65)*0.77-.385; float l=sdS(fp3,.12)*0.77;
  return sm(sm(sm(sm(sm(sm(sm(sm(sm(sm(sm(a,b,.3),c,.3),d,.25),e,.22),f,.2),g,.2),h2,.25),i2,.2),j,.4),k2,.35),l,.25);
}

float density(vec3 pos, float t){
  float d1=warp5(pos*1.0,t)-.43;
  float d2=fbm(pos*2.1+vec3(t*.05,0,t*.04))-.49;
  float d3=fbm(pos*3.9-vec3(0,t*.04,t*.03))-.53;
  float d4=fbm(pos*7.2+t*.07)-.555;
  float d5=fbm(pos*13.5-t*.06)-.57;
  float d6=fbm(pos*24.0+t*.08)-.575;
  float den=max(0.,d1*.40+d2*.20+d3*.15+d4*.11+d5*.08+d6*.06);
  float sd=scene(pos,t);
  den+=max(0.,.09-sd)*14.0;
  return den*.80;
}

float shadow(vec3 pos, vec3 ldir, float t){
  float occ=0.;vec3 sp=pos;
  for(int i=0;i<SHAD_STEPS;i++){
    sp+=ldir*SHAD_STEP;
    occ+=density(sp,t)*.5;
    if(occ>1.)return 0.;
  }
  return exp(-occ*2.5);
}

// 5 palette functions
vec3 pal1(float t){return vec3(.5)+vec3(.5)*cos(TAU*(vec3(1,1,1)*t+vec3(.00,.33,.67)));}
vec3 pal2(float t){return vec3(.5)+vec3(.5)*cos(TAU*(vec3(2,1,0)*t+vec3(.50,.20,.25)));}
vec3 pal3(float t){return vec3(.5)+vec3(.5)*cos(TAU*(vec3(1,1,.5)*t+vec3(.80,.90,.30)));}
vec3 pal4(float t){return vec3(.5)+vec3(.5)*cos(TAU*(vec3(.5,1,2)*t+vec3(.00,.50,1.00)));}
vec3 pal5(float t){return vec3(.5)+vec3(.5)*cos(TAU*(vec3(1,.5,1)*t+vec3(.25,.75,.50)));}

// Single ray trace
vec3 trace(vec2 uv, float t){
  float ct=t*.16;
  vec3 ro=vec3(
    sin(ct)*4.5+cos(ct*1.3)*.9+sin(ct*2.7)*.3,
    cos(ct*.7)*3.5+sin(ct*1.6)*.7+cos(ct*3.1)*.2,
    cos(ct)*4.5+sin(ct*1.1)*.9+cos(ct*2.3)*.3
  );
  vec3 ta=vec3(sin(t*.3)*.6,cos(t*.22)*.4,sin(t*.17)*.3);
  vec3 ww=normalize(ta-ro),uu=normalize(cross(ww,vec3(0,1,0))),vv=cross(uu,ww);
  float dl=length(uv);uv+=uv*dl*dl*.07;
  vec3 rd=normalize(uv.x*uu+uv.y*vv+1.5*ww);

  // 12 dynamic lights
  vec3 lp[12];
  lp[0] =vec3(sin(t*1.1)*2.4,cos(t*.9)*1.7,sin(t*.7)*2.4);
  lp[1] =vec3(cos(t*.8)*2.4,sin(t*1.3)*1.7,cos(t*1.1)*2.4);
  lp[2] =vec3(sin(t*1.4+2.1)*1.9,cos(t*1.0)*2.4,sin(t*.6)*1.9);
  lp[3] =vec3(cos(t*.7+1.0)*1.9,sin(t*.8)*1.3,cos(t*1.4)*2.4);
  lp[4] =vec3(sin(t*.9+3.0)*2.9,cos(t*1.2)*.9,cos(t*.5)*1.3);
  lp[5] =vec3(cos(t*1.3+2.0)*1.3,sin(t*.6)*2.9,sin(t*1.0)*1.9);
  lp[6] =vec3(sin(t*.5+1.5)*3.3,cos(t*1.4)*1.5,cos(t*.9)*.9);
  lp[7] =vec3(cos(t*1.2+.5)*.9,sin(t*1.1)*3.3,sin(t*.8)*1.3);
  lp[8] =vec3(sin(t*.6+2.5)*2.6,cos(t*.7)*2.6,sin(t*1.2+1.0)*1.6);
  lp[9] =vec3(cos(t*1.5+3.1)*1.6,sin(t*.9)*1.6,cos(t*.6+2.0)*3.1);
  lp[10]=vec3(sin(t*1.7+1.0)*1.2,cos(t*.4)*3.5,sin(t*1.4+2.0)*1.2);
  lp[11]=vec3(cos(t*.3+2.0)*3.5,sin(t*1.6)*1.2,cos(t*1.8+1.0)*1.2);

  vec3 lc[12];
  lc[0]=vec3(1.,.3,.1); lc[1]=vec3(.1,.4,1.); lc[2]=vec3(.8,1.,.2); lc[3]=vec3(1.,.1,.8);
  lc[4]=vec3(.2,1.,.8); lc[5]=vec3(1.,.8,.1); lc[6]=vec3(.5,.1,1.); lc[7]=vec3(.1,1.,.4);
  lc[8]=vec3(1.,.5,.0); lc[9]=vec3(.0,.7,1.); lc[10]=vec3(1.,1.,.2); lc[11]=vec3(.2,.1,1.);

  vec3 col=vec3(0.);float transmit=1.;vec3 pos=ro;

  for(int i=0;i<STEPS;i++){
    pos+=rd*STEP;
    if(length(pos)>5.5)break;
    float den=density(pos,t);
    if(den>.001){
      float p1=fbm(pos*2.0+t*.07);
      float p2=fbm(pos*3.5-t*.05);
      float p3=warp5(pos*.6,t);
      float p4=fbm(pos*6.0+t*.09);
      float p5=fbm(pos*11.0-t*.06);
      vec3 emit=pal1(p1+t*.03)*1.3
               +pal2(p2-t*.04)*.9
               +pal3(p3+t*.05)*.7
               +pal4(p4+t*.06)*.5
               +pal5(p5-t*.07)*.3;

      // 12 lights × shadow ray each
      for(int l=0;l<12;l++){
        vec3 ldir=normalize(lp[l]-pos);
        float ldist=length(pos-lp[l]);
        float atten=1./(1.+ldist*ldist*1.4);
        float shad=shadow(pos,ldir,t);
        emit+=lc[l]*atten*shad*3.5;
      }

      float sd=scene(pos,t);
      emit+=pal1(t*.12+p1)*exp(-abs(sd)*7.)*6.;
      emit+=vec3(2.2,1.1,.3)*exp(-length(pos)*2.3)*4.;
      // Subsurface-like scatter
      emit+=pal3(p3+p2)*exp(-den*2.)*1.5;

      col+=transmit*den*4.5*emit;
      transmit*=exp(-den*5.*STEP);
      if(transmit<.0015)break;
    }
  }

  float s1=pow(max(0.,h12(uv*1000.+vec2(47.3,23.1))-.976)*42.,2.);
  float s2=pow(max(0.,h12(uv*1600.+vec2(11.7,89.4))-.983)*52.,2.);
  float s3=pow(max(0.,h12(uv*2400.+vec2(33.1,61.7))-.988)*60.,2.);
  vec3 bg=pal2(fbm(rd*2.+t*.01))*fbm(rd*4.+t*.02)*.4
         +pal4(fbm(rd*3.+t*.015))*fbm(rd*6.+t*.018)*.2;
  bg+=vec3(s1*.8,s1*.9,s1)+vec3(s2,s2*.8,s2*.9)+vec3(s3*.9,s3,s3*.8);
  col+=bg*transmit;
  col=col/(col+1.);
  col=pow(max(col,0.),vec3(.4545));
  return col;
}

void main(){
  vec2 res=u_res;
  float t=u_time;
  vec2 fc=gl_FragCoord.xy;

  // 9×SSAA — 9 subpixel samples per pixel
  vec3 col=vec3(0.);
  for(int sx=0;sx<3;sx++){
    for(int sy=0;sy<3;sy++){
      vec2 offset=vec2(float(sx)-1.,float(sy)-1.)*0.333;
      vec2 uv=(fc+offset-0.5*res)/min(res.x,res.y);
      col+=trace(uv,t);
    }
  }
  col/=9.;

  // Vignette
  vec2 vUV=fc/res;
  col*=pow(vUV.x*vUV.y*(1.-vUV.x)*(1.-vUV.y)*16.,.25);

  gl_FragColor=vec4(col,1.);
}
`;

// Post pass
const FS_POST=`
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform sampler2D u_tex;
float h12(vec2 p){vec3 q=fract(vec3(p.xyx)*.1031);q+=dot(q,q.yzx+33.33);return fract((q.x+q.y)*q.z);}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float t=u_time;
  // Chromatic aberration 7-sample
  float ca=0.007+0.003*sin(t*2.7);
  vec3 col=vec3(0.);
  for(int i=0;i<7;i++){
    float f=(float(i)/6.-.5)*2.;
    col.r+=texture2D(u_tex,uv+vec2(ca*f,0.)).r/7.;
    col.g+=texture2D(u_tex,uv).g/7.;
    col.b+=texture2D(u_tex,uv-vec2(ca*f,0.)).b/7.;
  }
  // Heavy bloom 11×11 = 121 samples
  vec2 px=1./u_res;
  vec3 bloom=vec3(0.);float wt=0.;
  for(int x=-5;x<=5;x++){
    for(int y=-5;y<=5;y++){
      float w=exp(-float(x*x+y*y)*.08);
      bloom+=texture2D(u_tex,uv+vec2(float(x),float(y))*px*4.).rgb*w;
      wt+=w;
    }
  }
  bloom/=wt;
  col+=max(vec3(0.),bloom-.4)*2.2;
  // Scanlines
  col*=.92+.08*sin(uv.y*u_res.y*3.14159);
  // Grain
  col+=(h12(uv+vec2(t*.13,t*.09))-.5)*.045;
  // Grade
  col=pow(max(col,0.),vec3(1.12,1.0,.9));
  col=mix(vec3(dot(col,vec3(.299,.587,.114))),col,1.4);
  gl_FragColor=vec4(col,1.);
}
`;

const VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
function mkP(fs){
  const p=gl.createProgram(),v=gl.createShader(gl.VERTEX_SHADER),f=gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(v,VS);gl.compileShader(v);
  gl.shaderSource(f,fs);gl.compileShader(f);
  if(!gl.getShaderParameter(f,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(f));
  gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);return p;
}
const pM=mkP(FS_MAIN),pP=mkP(FS_POST);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
function bQ(prog){const l=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);}
function mkFBO(w,h){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return{fbo,tex};
}
let W=canvas.width,H=canvas.height,fbo=mkFBO(W,H);
window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth*3;H=canvas.height=window.innerHeight*3;
  canvas.style.width='100vw';canvas.style.height='100vh';fbo=mkFBO(W,H);
});
const t0=performance.now();
function render(){
  const t=(performance.now()-t0)/1000;
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo.fbo);gl.viewport(0,0,W,H);
  gl.useProgram(pM);bQ(pM);
  gl.uniform2f(gl.getUniformLocation(pM,'u_res'),W,H);
  gl.uniform1f(gl.getUniformLocation(pM,'u_time'),t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,W,H);
  gl.useProgram(pP);bQ(pP);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbo.tex);
  gl.uniform1i(gl.getUniformLocation(pP,'u_tex'),0);
  gl.uniform2f(gl.getUniformLocation(pP,'u_res'),W,H);
  gl.uniform1f(gl.getUniformLocation(pP,'u_time'),t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
